<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FPS Multiplayer</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="client/css/style.css">
</head>
<body>
<div id="game-container"></div>

<!-- ============ MENUS ============ -->
<div id="menu" class="screen">
  <h1 class="title">FRONTLINE<span>.JS</span></h1>
  <input id="player-name" maxlength="16" placeholder="Your name" value="">
  <div class="menu-buttons">
    <button id="btn-create">CREATE ROOM</button>
    <button id="btn-browse">BROWSE ROOMS</button>
    <button id="btn-join-code">JOIN BY CODE</button>
    <button id="btn-settings">SETTINGS</button>
  </div>
  <div id="conn-status">Connecting…</div>
</div>

<div id="browser" class="screen hidden">
  <h2>ROOMS</h2>
  <div id="room-list"></div>
  <button id="btn-refresh">REFRESH</button>
  <button id="btn-back-browse" class="back">BACK</button>
</div>

<div id="create" class="screen hidden">
  <h2>CREATE ROOM</h2>
  <label>Room name <input id="c-name" maxlength="24" placeholder="My Room"></label>
  <label>Mode <select id="c-mode"><option value="tdm">Team Deathmatch</option><option value="ffa">Free-For-All</option><option value="ctf">Capture The Flag</option><option value="snd">Search &amp; Destroy</option></select></label>
  <label>Map <select id="c-map"><option value="dustfall">Dustfall</option><option value="ironworks">Ironworks</option><option value="coldfront">Coldfront</option></select></label>
  <label>Kill limit <input id="c-kills" type="number" value="30" min="5" max="100"></label>
  <label>Time limit (s) <input id="c-time" type="number" value="600" min="60" max="1800"></label>
  <label>Friendly fire <input id="c-ff" type="checkbox"></label>
  <label>Max players <input id="c-max" type="number" value="16" min="2" max="16"></label>
  <button id="btn-do-create">CREATE</button>
  <button id="btn-back-create" class="back">BACK</button>
</div>

<div id="lobby" class="screen hidden">
  <h2 id="lobby-title">LOBBY</h2>
  <div id="lobby-code"></div>
  <div id="lobby-settings"></div>
  <div id="lobby-players"></div>
  <div class="lobby-actions">
    <button id="btn-team-red">JOIN RED</button>
    <button id="btn-team-blue">JOIN BLUE</button>
    <button id="btn-ready">READY</button>
    <button id="btn-force-start" class="hidden">FORCE START</button>
    <button id="btn-leave" class="back">LEAVE</button>
  </div>
</div>

<div id="settings" class="screen hidden">
  <h2>SETTINGS</h2>
  <label>FOV <input id="s-fov" type="range" min="70" max="110" value="90"><span id="s-fov-v">90</span></label>
  <label>Sensitivity <input id="s-sens" type="range" min="1" max="20" value="8"></label>
  <label>Master volume <input id="s-vol" type="range" min="0" max="100" value="70"></label>
  <label>Render distance <input id="s-dist" type="range" min="50" max="300" value="200"></label>
  <label>Crosshair color <input id="s-xhair" type="color" value="#00ff88"></label>
  <label>Damage numbers <input id="s-dmgnum" type="checkbox" checked></label>
  <label>Shadows <input id="s-shadows" type="checkbox" checked></label>
  <button id="btn-back-settings" class="back">BACK</button>
</div>

<div id="gameover" class="screen hidden">
  <h2 id="go-title">MATCH OVER</h2>
  <div id="go-board"></div>
  <button id="btn-return-lobby">RETURN TO LOBBY</button>
</div>

<!-- ============ HUD ============ -->
<div id="hud" class="hidden">
  <div id="crosshair"></div>
  <div id="hitmarker"></div>
  <div id="scope-overlay" class="hidden"></div>
  <div id="vignette"></div>
  <div id="flash-overlay"></div>
  <div id="health-panel"><div id="hp-bar"><div id="hp-fill"></div></div><div id="armor-bar"><div id="armor-fill"></div></div><span id="hp-text">100</span></div>
  <div id="ammo-panel"><span id="weapon-name">AK-47</span><span id="ammo-text">30 / 120</span><div id="nade-row"></div></div>
  <div id="killfeed"></div>
  <div id="minimap"><canvas id="minimap-canvas" width="180" height="180"></canvas></div>
  <div id="objective-panel"><span id="obj-timer"></span><span id="obj-text"></span></div>
  <div id="ping-display">-- ms</div>
  <div id="respawn-overlay" class="hidden"><span id="respawn-text"></span></div>
  <div id="damage-numbers"></div>
  <div id="chat"><div id="chat-log"></div><input id="chat-input" class="hidden" maxlength="120" placeholder="Chat…"></div>
  <div id="scoreboard" class="hidden"></div>
  <div id="center-msg"></div>
  <div id="interact-hint" class="hidden"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="shared/constants.js"></script>
<script src="shared/protocol.js"></script>
<script src="client/js/renderer.js"></script>
<script src="client/js/physics.js"></script>
<script src="client/js/audio.js"></script>
<script src="client/js/effects.js"></script>
<script src="client/js/maps.js"></script>
<script src="client/js/weapons.js"></script>
<script src="client/js/entities.js"></script>
<script src="client/js/player.js"></script>
<script src="client/js/network.js"></script>
<script src="client/js/gamemodes.js"></script>
<script src="client/js/ui.js"></script>
<script src="client/js/main.js"></script>
</body>
</html>
